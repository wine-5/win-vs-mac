name: Architecture Compliance Check

on:
  pull_request:
    branches:
      - main
      - develop
      - feature/*
  push:
    branches:
      - main
      - develop

jobs:
  architecture-check:
    name: Check Architecture Violations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Architecture Check
        run: |
          chmod +x scripts/check_architecture.sh
          bash scripts/check_architecture.sh src
        continue-on-error: true
        id: arch-check

      - name: Report Results
        if: always()
        run: |
          if [ ${{ steps.arch-check.outcome }} = "success" ]; then
            echo "## ✅ Architecture Compliance Check Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No architecture violations detected." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Architecture Violations Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR/push introduces architecture violations." >> $GITHUB_STEP_SUMMARY
            echo "詳細: [ARCHITECTURE_VIOLATIONS.md](docs/architecture/ARCHITECTURE_VIOLATIONS.md)" >> $GITHUB_STEP_SUMMARY
          fi

      # ========================================
      # Discord Bot で統合メッセージを送信
      # ========================================
      - name: Prepare Discord Message (Success)
        if: success()
        run: |
          cat > discord_payload.json << 'EOF'
          {
            "embeds": [{
              "title": "✅ Architecture Compliance Check",
              "description": "アーキテクチャチェック: **PASSED**",
              "color": 65280,
              "fields": [
                {"name": "Status", "value": "✅ 違反なし", "inline": true},
                {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                {"name": "Repository", "value": "${{ github.repository }}", "inline": false},
                {"name": "Triggered by", "value": "<@${{ github.actor_id }}>", "inline": true},
                {"name": "Action Link", "value": "[View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true}
              ],
              "footer": {
                "text": "Architecture Compliance Check | ${{ github.event_name }}"
              },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }
          EOF
        id: prepare-success

      - name: Prepare Discord Message (Failure)
        if: failure()
        run: |
          cat > discord_payload.json << 'EOF'
          {
            "embeds": [{
              "title": "❌ Architecture Compliance Check",
              "description": "アーキテクチャチェック: **FAILED**",
              "color": 16711680,
              "fields": [
                {"name": "Status", "value": "❌ 違反検出", "inline": true},
                {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                {"name": "Repository", "value": "${{ github.repository }}", "inline": false},
                {"name": "Triggered by", "value": "<@${{ github.actor_id }}>", "inline": true},
                {"name": "詳細ドキュメント", "value": "[ARCHITECTURE_VIOLATIONS.md](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/docs/architecture/ARCHITECTURE_VIOLATIONS.md)", "inline": true},
                {"name": "Action Link", "value": "[View Workflow Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
              ],
              "footer": {
                "text": "Architecture Compliance Check | ${{ github.event_name }}"
              },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }
          EOF
        id: prepare-failure

      - name: Send to Discord Bot
        if: always()
        run: |
          if [ -z "${{ secrets.DISCORD_BOT_TOKEN }}" ] || [ -z "${{ secrets.DISCORD_CHANNEL_ID }}" ]; then
            echo "⚠️  Discord Bot Token or Channel ID not set. Skipping notification."
            exit 0
          fi
          curl -X POST "https://discordapp.com/api/channels/${{ secrets.DISCORD_CHANNEL_ID }}/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @discord_payload.json
