name: CI

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore DxLib-3D.sln

      - name: Build (Debug x64)
        run: |
          msbuild DxLib-3D.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /m `
            /fl /flp:"logfile=build_output.txt;verbosity=minimal"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build_output.txt
          if-no-files-found: warn

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Check initialization style
        id: check_init
        continue-on-error: true
        run: |
          chmod +x .github/scripts/check-initialization.sh
          .github/scripts/check-initialization.sh 2>&1 | tee init_check_output.txt
          exit ${PIPESTATUS[0]}

      - name: Check architecture compliance
        id: check_arch
        continue-on-error: true
        run: |
          chmod +x .github/scripts/check-architecture.sh
          .github/scripts/check-architecture.sh 2>&1 | tee arch_check_output.txt
          exit ${PIPESTATUS[0]}

      - name: Check JavaScript naming convention
        id: check_js
        continue-on-error: true
        run: |
          chmod +x .github/scripts/check-javascript.sh
          .github/scripts/check-javascript.sh 2>&1 | tee js_check_output.txt
          exit ${PIPESTATUS[0]}

      - name: Run clang-tidy
        id: run_lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          FILES=$(find src -name "*.cpp")
          INCLUDES=$(find src -type d | sed 's/^/-I/')
          LINT_OUTPUT=""
          FAILED=0
          for f in $FILES; do
            echo "Checking: $f" >&2
            OUTPUT=$(clang-tidy "$f" \
              --config-file=.clang-tidy \
              --header-filter="^$PWD/src/(?!.*thirdparty).*" \
              -- \
              -std=c++20 \
              $INCLUDES \
              -isystem thirdparty \
              -DDXLIB_DISABLE 2>&1)
            
            # thirdpartyとDxLibのエラーを除外
            FILTERED=$(echo "$OUTPUT" | grep -v "thirdparty" | grep -v "DxLib.h" | grep -v "file not found")
            
            if echo "$FILTERED" | grep -q "warning:\|error:"; then
              echo "❌ Found issues in $f" >&2
              LINT_OUTPUT="$LINT_OUTPUT\n=== $f ===\n$FILTERED\n"
              FAILED=1
            else
              echo "✅ $f passed" >&2
            fi
          done
          echo -e "$LINT_OUTPUT" > lint_output.txt
          
          # 結果をログに出力
          if [ "$FAILED" -eq 1 ]; then
            echo "=== Lint Errors Found ===" >&2
            cat lint_output.txt >&2
          fi
          
          exit $FAILED

      - name: Combine lint results
        if: always()
        run: |
          echo "=== Initialization Check ===" > combined_lint.txt
          if [ -f "init_check_output.txt" ]; then
            cat init_check_output.txt >> combined_lint.txt
          else
            echo "No initialization check output" >> combined_lint.txt
          fi
          echo "" >> combined_lint.txt
          echo "=== Architecture Compliance ===" >> combined_lint.txt
          if [ -f "arch_check_output.txt" ]; then
            cat arch_check_output.txt >> combined_lint.txt
          else
            echo "No architecture check output" >> combined_lint.txt
          fi
          echo "" >> combined_lint.txt
          echo "=== JavaScript Naming Convention ===" >> combined_lint.txt
          if [ -f "js_check_output.txt" ]; then
            cat js_check_output.txt >> combined_lint.txt
          else
            echo "No JavaScript naming check output" >> combined_lint.txt
          fi
          echo "" >> combined_lint.txt
          echo "=== clang-tidy Check ===" >> combined_lint.txt
          if [ -f "lint_output.txt" ]; then
            cat lint_output.txt >> combined_lint.txt
          else
            echo "No clang-tidy output" >> combined_lint.txt
          fi

      - name: Fail if any check failed
        if: steps.check_init.outcome == 'failure' || steps.check_arch.outcome == 'failure' || steps.check_js.outcome == 'failure' || steps.run_lint.outcome == 'failure'
        run: exit 1

      - name: Upload lint result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: combined_lint.txt
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()

    steps:
      - name: Download lint result
        uses: actions/download-artifact@v4
        with:
          name: lint-output
        continue-on-error: true

      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: build-output
        continue-on-error: true

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          LINT_STATUS="${{ needs.lint.result }}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # combined_lint.txt から指定セクション（=== 見出し === 〜 次の見出し）を取り出す
          extract_section() {
            [ -f "combined_lint.txt" ] || return 0
            # セクション本文にも "=== xxx ===" 行が現れるため、見出し行だけを終端とみなす
            awk -v head="$1" '
              /^=== (Initialization Check|Architecture Compliance|JavaScript Naming Convention|clang-tidy Check) ===$/ {
                grab = ($0 == head)
                next
              }
              grab { print }
            ' combined_lint.txt
          }

          # 実行環境の絶対パスを取り除いてリポジトリ相対にする
          strip_paths() {
            sed 's|/home/runner/work/[^/]*/[^/]*/||g; s|[A-Za-z]:\\a\\[^\\]*\\[^\\]*\\||g'
          }

          NL=$'\n'
          FENCE='```'

          # 見出し付きのコードブロックとして詳細に追記する
          DETAILS=""
          add_section() {
            local title="$1"
            local body="$2"
            [ -n "$body" ] || return 0
            body=$(printf '%s' "$body" | head -c 700)
            DETAILS="${DETAILS}${NL}**${title}**${NL}${FENCE}${NL}${body}${NL}${FENCE}${NL}"
          }

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            MESSAGE="✅ ビルド・コードチェック成功 (C++命名規則・初期化・アーキテクチャ・JS命名規則)"
            COLOR=3066993
          else
            if [ -f "combined_lint.txt" ]; then
              echo "=== Lint Output File Contents ===" >&2
              cat combined_lint.txt >&2
            else
              echo "⚠️ combined_lint.txt not found" >&2
            fi

            # ビルドエラー（MSBuild の error / fatal error 行）
            BUILD_ERRORS=""
            if [ "$BUILD_STATUS" != "success" ] && [ -f "build_output.txt" ]; then
              BUILD_ERRORS=$(grep -E "error [A-Z]+[0-9]+|fatal error" build_output.txt \
                | sort -u | head -10 | strip_paths)
            fi

            # 初期化スタイル違反
            INIT_ERRORS=$(extract_section "=== Initialization Check ===" \
              | grep -E "初期化は \{\} を使ってください" | head -10 | strip_paths)

            # アーキテクチャ違反
            ARCH_VIOLATIONS=$(extract_section "=== Architecture Compliance ===" \
              | grep -E "^\s*src/|❌|⚠️" | grep -v "合格" | head -12 | strip_paths)

            # JavaScript 命名規則違反
            JS_VIOLATIONS=$(extract_section "=== JavaScript Naming Convention ===" \
              | grep -E "❌|⚠️|^\s+web/" | grep -v "合格" | head -12 | strip_paths)

            # clang-tidy の警告・エラー
            TIDY_ERRORS=$(extract_section "=== clang-tidy Check ===" \
              | grep -E "warning:|error:" | head -10 | strip_paths)

            add_section "🔨 ビルドエラー" "$BUILD_ERRORS"
            add_section "🔴 アーキテクチャ違反" "$ARCH_VIOLATIONS"
            add_section "🟠 初期化スタイル違反" "$INIT_ERRORS"
            add_section "🟣 JavaScript命名規則違反" "$JS_VIOLATIONS"
            add_section "🟡 clang-tidy 警告" "$TIDY_ERRORS"

            if [ -z "$DETAILS" ]; then
              DETAILS="${NL}詳細を抽出できませんでした。ログを確認してください。${NL}"
            fi

            MESSAGE="❌ **失敗**${NL}ビルド: \`${BUILD_STATUS}\`${NL}コードチェック: \`${LINT_STATUS}\`${NL}${DETAILS}${NL}🔗 [GitHub Actions のログを開く](${RUN_URL})"
            COLOR=15158332
          fi

          # Discord の description 上限（4096文字）に収める
          MESSAGE=$(printf '%s' "$MESSAGE" | head -c 3900)

          PAYLOAD=$(jq -n \
            --arg msg "$MESSAGE" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            '{embeds: [{title: "CI結果", url: $url, description: $msg, color: $color}]}')

          curl -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"