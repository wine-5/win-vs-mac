name: CI

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Debug x64)
        run: |
          msbuild DxLib-3D.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /m

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        id: run_lint
        shell: bash
        run: |
          set +e
          FILES=$(find src -name "*.cpp")
          INCLUDES=$(find src -type d | sed 's/^/-I/')
          LINT_OUTPUT=""
          FAILED=0
          for f in $FILES; do
            echo "Checking: $f" >&2
            OUTPUT=$(clang-tidy "$f" \
              --config-file=.clang-tidy \
              --header-filter="^$PWD/src/.*" \
              -- \
              -std=c++17 \
              $INCLUDES \
              -DDXLIB_DISABLE 2>&1)
            if echo "$OUTPUT" | grep -q "warning:\|error:"; then
              echo "❌ Found issues in $f" >&2
              LINT_OUTPUT="$LINT_OUTPUT\n=== $f ===\n$OUTPUT\n"
              FAILED=1
            else
              echo "✅ $f passed" >&2
            fi
          done
          echo -e "$LINT_OUTPUT" > lint_output.txt
          
          # 結果をログに出力
          if [ "$FAILED" -eq 1 ]; then
            echo "=== Lint Errors Found ===" >&2
            cat lint_output.txt >&2
          fi
          
          exit $FAILED

      - name: Upload lint result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint_output.txt
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()

    steps:
      - name: Download lint result
        uses: actions/download-artifact@v4
        with:
          name: lint-output
        continue-on-error: true

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          LINT_STATUS="${{ needs.lint.result }}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            MESSAGE="✅ ビルド・命名規則チェック成功"
            COLOR=3066993
          else
            LINT_DETAILS=""
            if [ -f "lint_output.txt" ] && [ -s "lint_output.txt" ]; then
              echo "=== Lint Output File Contents ===" >&2
              cat lint_output.txt >&2
              
              # エラーを抽出して整形（最大15件）
              LINT_DETAILS=$(grep -A 2 "warning:\|error:" lint_output.txt \
                | grep -v "thirdparty" \
                | grep -v "file not found" \
                | head -20 \
                | sed 's|/home/runner/work/[^/]*/[^/]*/||' \
                | sed \
                  -e 's/invalid case style for member.*/❌ メンバ変数にm_プレフィックスが必要/g' \
                  -e 's/invalid case style for namespace.*/❌ 名前空間は小文字にしてください/g' \
                  -e 's/invalid case style for function.*/❌ 関数名はcamelCaseにしてください/g' \
                  -e 's/invalid case style for variable.*/❌ ローカル変数はcamelCaseにしてください/g' \
                  -e 's/invalid case style for constant.*/❌ 定数はUPPER_SNAKE_CASEにしてください/g' \
                  -e 's/invalid case style for enum.*/❌ 列挙型はPascalCaseにしてください/g' \
                  -e 's/variable .* is not initialized.*/❌ 変数が初期化されていません/g' \
                | grep -v "^--$")
              
              if [ -n "$LINT_DETAILS" ]; then
                LINT_DETAILS="\n\n**エラー詳細:**\n\`\`\`\n${LINT_DETAILS}\n\`\`\`"
              else
                LINT_DETAILS="\n\n⚠️ lint_output.txtにエラーが記録されていますが、抽出に失敗しました"
              fi
            else
              echo "⚠️ lint_output.txt not found or empty" >&2
            fi
            
            MESSAGE="❌ **失敗**\nビルド: \`${BUILD_STATUS}\`\n命名規則: \`${LINT_STATUS}\`${LINT_DETAILS}"
            COLOR=15158332
          fi

          PAYLOAD=$(jq -n \
            --arg msg "$MESSAGE" \
            --argjson color "$COLOR" \
            '{embeds: [{title: "CI結果", description: $msg, color: $color}]}')

          curl -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"