name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Debug x64)
        run: |
          msbuild DxLib-3D.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /m

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        id: run_lint
        shell: bash
        run: |
          set +e
          FILES=$(find src -name "*.cpp")
          LINT_OUTPUT=""
          FAILED=0
          for f in $FILES; do
            OUTPUT=$(clang-tidy "$f" \
              --config-file=.clang-tidy \
              --header-filter="^$PWD/src/.*" \
              -- \
              -std=c++17 \
              -I$PWD/src \
              -DDXLIB_DISABLE 2>&1)
            if echo "$OUTPUT" | grep -q "warning:\|error:"; then
              LINT_OUTPUT="$LINT_OUTPUT$OUTPUT"
              FAILED=1
            fi
          done
          echo "$LINT_OUTPUT" > lint_output.txt
          exit $FAILED

      - name: Upload lint result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint_output.txt
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()

    steps:
      - name: Download lint result
        uses: actions/download-artifact@v4
        with:
          name: lint-output
        continue-on-error: true

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          LINT_STATUS="${{ needs.lint.result }}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            MESSAGE="✅ ビルド・命名規則チェック成功"
            COLOR=3066993
          else
            LINT_DETAILS=""
            if [ -f "lint_output.txt" ]; then
              LINT_DETAILS=$(grep "warning:\|error:" lint_output.txt \
                | grep -v "thirdparty" \
                | sed 's|/home/runner/work/DxLib-3D-Game/DxLib-3D-Game/||' \
                | head -10 \
                | awk -F: '{print $1 " 行" $2 ": " $4}' \
                | tr '\n' '\n')
            fi
            MESSAGE="❌ 失敗\nビルド: $BUILD_STATUS\n命名規則: $LINT_STATUS\n\n$LINT_DETAILS"
            COLOR=15158332
          fi

          PAYLOAD=$(jq -n \
            --arg msg "$MESSAGE" \
            --argjson color "$COLOR" \
            '{embeds: [{title: "CI結果", description: $msg, color: $color}]}')

          curl -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"