name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Debug x64)
        run: |
          msbuild DxLib-3D.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /m

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: |
          FILES=$(find src -name "*.cpp")
          for f in $FILES; do
            clang-tidy "$f" \
              --config-file=.clang-tidy \
              --header-filter="^$PWD/src/.*" \
              -- \
              -std=c++17 \
              -I$PWD/src \
              -DDXLIB_DISABLE
          done

  notify:
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()

    steps:
      - name: Debug Webhook URL
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "URL length: ${#WEBHOOK}"
          echo "URL start: ${WEBHOOK:0:30}"

      - name: Notify Discord
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          LINT_STATUS="${{ needs.lint.result }}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            COLOR=3066993
            MESSAGE="✅ ビルド・命名規則チェック成功"
          else
            COLOR=15158332
            MESSAGE="❌ 失敗 ビルド: $BUILD_STATUS 命名規則: $LINT_STATUS"
          fi

          WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"

          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"CI結果\", \"description\": \"$MESSAGE\", \"color\": $COLOR}]}" \
            "$WEBHOOK"