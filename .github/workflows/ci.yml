name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Debug x64)
        run: |
          msbuild DxLib-3D.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /m