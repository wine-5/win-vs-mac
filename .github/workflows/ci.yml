name: CI

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Debug x64)
        run: |
          msbuild DxLib-3D.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /m

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Check initialization style
        id: check_init
        continue-on-error: true
        run: |
          chmod +x .github/scripts/check-initialization.sh
          .github/scripts/check-initialization.sh 2>&1 | tee init_check_output.txt
          exit ${PIPESTATUS[0]}

      - name: Check architecture compliance
        id: check_arch
        continue-on-error: true
        run: |
          chmod +x .github/scripts/check-architecture.sh
          .github/scripts/check-architecture.sh 2>&1 | tee arch_check_output.txt
          exit ${PIPESTATUS[0]}

      - name: Run clang-tidy
        id: run_lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          FILES=$(find src -name "*.cpp")
          INCLUDES=$(find src -type d | sed 's/^/-I/')
          LINT_OUTPUT=""
          FAILED=0
          for f in $FILES; do
            echo "Checking: $f" >&2
            OUTPUT=$(clang-tidy "$f" \
              --config-file=.clang-tidy \
              --header-filter="^$PWD/src/(?!.*thirdparty).*" \
              -- \
              -std=c++17 \
              $INCLUDES \
              -isystem thirdparty \
              -DDXLIB_DISABLE 2>&1)
            
            # thirdpartyとDxLibのエラーを除外
            FILTERED=$(echo "$OUTPUT" | grep -v "thirdparty" | grep -v "DxLib.h" | grep -v "file not found")
            
            if echo "$FILTERED" | grep -q "warning:\|error:"; then
              echo "❌ Found issues in $f" >&2
              LINT_OUTPUT="$LINT_OUTPUT\n=== $f ===\n$FILTERED\n"
              FAILED=1
            else
              echo "✅ $f passed" >&2
            fi
          done
          echo -e "$LINT_OUTPUT" > lint_output.txt
          
          # 結果をログに出力
          if [ "$FAILED" -eq 1 ]; then
            echo "=== Lint Errors Found ===" >&2
            cat lint_output.txt >&2
          fi
          
          exit $FAILED

      - name: Combine lint results
        if: always()
        run: |
          echo "=== Initialization Check ===" > combined_lint.txt
          if [ -f "init_check_output.txt" ]; then
            cat init_check_output.txt >> combined_lint.txt
          else
            echo "No initialization check output" >> combined_lint.txt
          fi
          echo "" >> combined_lint.txt
          echo "=== Architecture Compliance ===" >> combined_lint.txt
          if [ -f "arch_check_output.txt" ]; then
            cat arch_check_output.txt >> combined_lint.txt
          else
            echo "No architecture check output" >> combined_lint.txt
          fi
          echo "" >> combined_lint.txt
          echo "=== clang-tidy Check ===" >> combined_lint.txt
          if [ -f "lint_output.txt" ]; then
            cat lint_output.txt >> combined_lint.txt
          else
            echo "No clang-tidy output" >> combined_lint.txt
          fi

      - name: Fail if any check failed
        if: steps.check_init.outcome == 'failure' || steps.check_arch.outcome == 'failure' || steps.run_lint.outcome == 'failure'
        run: exit 1

      - name: Upload lint result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: combined_lint.txt
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()

    steps:
      - name: Download lint result
        uses: actions/download-artifact@v4
        with:
          name: lint-output
        continue-on-error: true

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          LINT_STATUS="${{ needs.lint.result }}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            MESSAGE="✅ ビルド・コードチェック成功 (命名規則・初期化・アーキテクチャ)"
            COLOR=3066993
          else
            LINT_DETAILS=""
            if [ -f "combined_lint.txt" ] && [ -s "combined_lint.txt" ]; then
              echo "=== Lint Output File Contents ===" >&2
              cat combined_lint.txt >&2
              
              # エラーを抽出して整形
              LINT_DETAILS=$(cat combined_lint.txt \
                | grep -v "thirdparty" \
                | grep -v "DxLib.h" \
                | grep -v "file not found" \
                | grep -v "^$" \
                | grep -E "warning:|error:|src/" \
                | head -25 \
                | sed 's|/home/runner/work/[^/]*/[^/]*/||g' \
                | awk '
                  /invalid case style for member/ {print "❌ メンバ変数にm_プレフィックスが必要"; next}
                  /invalid case style for namespace/ {print "❌ 名前空間は小文字にしてください"; next}
                  /invalid case style for function/ {print "❌ 関数名はcamelCaseにしてください"; next}
                  /invalid case style for variable/ {print "❌ ローカル変数はcamelCaseにしてください"; next}
                  /invalid case style for constant/ {print "❌ 定数はUPPER_SNAKE_CASEにしてください"; next}
                  /invalid case style for enum/ {print "❌ 列挙型はPascalCaseにしてください"; next}
                  /variable .* is not initialized/ {print "❌ 変数が初期化されていません"; next}
                  /Found \(\) initialization/ {print "❌ 初期化は {} を使ってください（() は非推奨）"; next}
                  {print}
                ')
              
              if [ -n "$LINT_DETAILS" ]; then
                # Discordの文字数制限を考慮
                LINT_DETAILS=$(echo "$LINT_DETAILS" | head -c 1500)
                LINT_DETAILS="\n\n**エラー詳細:**\n\`\`\`\n${LINT_DETAILS}\n\`\`\`"
              else
                LINT_DETAILS="\n\n⚠️ エラー詳細の抽出に失敗しました。GitHub Actionsのログを確認してください。"
              fi
            else
              echo "⚠️ combined_lint.txt not found or empty" >&2
            fi
            
            MESSAGE="❌ **失敗**\nビルド: \`${BUILD_STATUS}\`\nコードチェック: \`${LINT_STATUS}\`${LINT_DETAILS}"
            COLOR=15158332
          fi

          PAYLOAD=$(jq -n \
            --arg msg "$MESSAGE" \
            --argjson color "$COLOR" \
            '{embeds: [{title: "CI結果", description: $msg, color: $color}]}')

          curl -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"