<script type="importmap">
{

    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* =========================================================
 * カラーパレット（要件定義書 2-3）
 * ======================================================= */
const C = {
  blue: '#00A4EF', blueDim: '#005F8A',
  yellow: '#FFC83D',
  apple: '#E8E8ED', apple2: '#F5F5F7',
  red: '#E81123'
};

/* =========================================================
 * 基本セットアップ
 * ======================================================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#000000');
/* 遠景の Apple 領域が「彼方の光」として見えるよう、霧はごく薄く */
scene.fog = new THREE.FogExp2(0x000208, 0.000042);

const camera = new THREE.PerspectiveCamera(62, 1, 1, 90000);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.75, 0.5, 0.62);
composer.addPass(bloom);
composer.addPass(new OutputPass());

scene.add(new THREE.AmbientLight(0x223044, 0.85));

/* =========================================================
 * Canvas テクスチャ工房
 * ======================================================= */
function canvasTex(w, h, draw, opts = {}) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  draw(cv.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  if (opts.repeat) { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(...opts.repeat); }
  return t;
}

/* フォルダ床 */
const folderFloorTex = canvasTex(1024, 1024, (g, w, h) => {
  g.fillStyle = '#070C13'; g.fillRect(0, 0, w, h);
  for (let y = 40; y < h; y += 64) {
    g.fillStyle = 'rgba(0,164,239,0.10)'; g.fillRect(24, y, w - 48, 2);
    g.fillStyle = 'rgba(255,200,61,0.35)'; g.fillRect(40, y - 14, 18, 12);
    g.fillStyle = 'rgba(0,164,239,0.25)';
    g.fillRect(70, y - 12, 180 + (y * 7) % 240, 8);
  }
  g.strokeStyle = C.blue; g.lineWidth = 10;
  g.shadowColor = C.blue; g.shadowBlur = 30;
  g.strokeRect(6, 6, w - 12, h - 12);
});

/* System32 用の濃青床（密度の高いグリッド） */
const sys32FloorTex = canvasTex(1024, 1024, (g, w, h) => {
  g.fillStyle = '#040A14'; g.fillRect(0, 0, w, h);
  g.strokeStyle = 'rgba(0,164,239,0.22)'; g.lineWidth = 2;
  for (let x = 0; x < w; x += 64) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, h); g.stroke(); }
  for (let y = 0; y < h; y += 64) { g.beginPath(); g.moveTo(0, y); g.lineTo(w, y); g.stroke(); }
  g.font = '600 30px Consolas, monospace';
  g.fillStyle = 'rgba(0,164,239,0.35)';
  for (let i = 0; i < 10; i++) g.fillText('.dll', (i * 197) % (w - 80), 60 + (i * 313) % (h - 80));
  g.strokeStyle = C.blue; g.lineWidth = 10;
  g.shadowColor = C.blue; g.shadowBlur = 34;
  g.strokeRect(5, 5, w - 10, h - 10);
});

/* パス通路（流れる文字）：区画ごとにパスを変える */
function makePathTex(lines) {
  return canvasTex(512, 1024, (g, w, h) => {
    g.fillStyle = '#060A10'; g.fillRect(0, 0, w, h);
    g.font = '600 42px Consolas, monospace';
    g.textAlign = 'center';
    for (let i = 0; i < 8; i++) {
      g.fillStyle = i % 2 ? 'rgba(0,164,239,0.85)' : 'rgba(0,164,239,0.35)';
      g.shadowColor = C.blue; g.shadowBlur = 18;
      g.fillText(lines[i % lines.length], w / 2, 90 + i * 128);
    }
    g.shadowBlur = 0;
    g.strokeStyle = 'rgba(0,164,239,0.9)'; g.lineWidth = 8;
    g.strokeRect(4, 0, w - 8, h);
  }, { repeat: [1, 2] });
}
const pathTexA = makePathTex(['C:\\Users\\Player\\', 'Desktop  >  ..\\..', 'Downloads\\', '>  >  >']);
const pathTexB = makePathTex(['..\\..\\Windows\\', 'System32\\', 'cd  /d  >', '>  >  >']);
const pathTexC = makePathTex(['C:\\Program Files\\', '>  >  >', 'Apple\\', 'ACCESS  >']);
const scrollTexes = [pathTexA, pathTexB, pathTexC];

/* ウィンドウ壁 */
function windowWallTex(title) {
  return canvasTex(2048, 1024, (g, w, h) => {
    g.fillStyle = 'rgba(10,16,26,0.94)'; g.fillRect(0, 0, w, h);
    g.fillStyle = '#0E1622'; g.fillRect(0, 0, w, 110);
    g.font = '600 46px Consolas, monospace';
    g.fillStyle = 'rgba(201,212,227,0.9)';
    g.textBaseline = 'middle';
    g.fillText('📁 ' + title, 46, 56);
    g.font = '400 52px "Segoe UI", sans-serif';
    g.textAlign = 'center';
    g.fillStyle = '#8FA0B5';
    g.fillText('—', w - 300, 52);
    g.strokeStyle = '#8FA0B5'; g.lineWidth = 5;
    g.strokeRect(w - 216, 30, 44, 44);
    g.fillStyle = C.red;
    g.shadowColor = C.red; g.shadowBlur = 24;
    g.font = '600 56px "Segoe UI", sans-serif';
    g.fillText('✕', w - 90, 54);
    g.shadowBlur = 0;
    g.strokeStyle = 'rgba(0,164,239,0.07)'; g.lineWidth = 2;
    for (let x = 0; x < w; x += 128) { g.beginPath(); g.moveTo(x, 110); g.lineTo(x, h); g.stroke(); }
    for (let y = 110; y < h; y += 128) { g.beginPath(); g.moveTo(0, y); g.lineTo(w, y); g.stroke(); }
    g.strokeStyle = C.blue; g.lineWidth = 10;
    g.shadowColor = C.blue; g.shadowBlur = 34;
    g.strokeRect(5, 5, w - 10, h - 10);
    g.textAlign = 'left';
  });
}

/* ファイルブロック */
function fileBlockTex(ext, color) {
  return canvasTex(512, 512, (g, w, h) => {
    g.fillStyle = '#0B1420'; g.fillRect(0, 0, w, h);
    g.strokeStyle = color; g.lineWidth = 8;
    g.shadowColor = color; g.shadowBlur = 22;
    g.strokeRect(4, 4, w - 8, h - 8);
    g.shadowBlur = 0;
    g.fillStyle = 'rgba(201,212,227,0.12)';
    g.fillRect(w/2 - 90, 90, 180, 220);
    g.beginPath(); g.moveTo(w/2 + 40, 90); g.lineTo(w/2 + 90, 140); g.lineTo(w/2 + 40, 140); g.closePath();
    g.fillStyle = 'rgba(201,212,227,0.25)'; g.fill();
    g.font = '600 84px Consolas, monospace';
    g.textAlign = 'center';
    g.fillStyle = color;
    g.shadowColor = color; g.shadowBlur = 16;
    g.fillText(ext, w/2, 420);
  });
}
const texExe = fileBlockTex('.exe', C.blue);
const texDllB = fileBlockTex('.dll', '#8FA6BF');
const texTxt = fileBlockTex('.txt', '#C9D4E3');
const texZip = fileBlockTex('.zip', C.yellow);

/* System32 通路壁：.dll がびっしり詰まった棚 */
const dllWallTex = canvasTex(1024, 512, (g, w, h) => {
  g.fillStyle = '#050B14'; g.fillRect(0, 0, w, h);
  for (let y = 16; y < h - 40; y += 96) {
    for (let x = 16; x < w - 60; x += 128) {
      g.fillStyle = 'rgba(0,164,239,0.08)';
      g.fillRect(x, y, 112, 80);
      g.strokeStyle = 'rgba(0,164,239,0.45)'; g.lineWidth = 2;
      g.strokeRect(x, y, 112, 80);
      g.font = '600 26px Consolas, monospace';
      g.fillStyle = 'rgba(0,164,239,0.7)';
      g.fillText('.dll', x + 26, y + 50);
    }
  }
  g.strokeStyle = C.blue; g.lineWidth = 8;
  g.shadowColor = C.blue; g.shadowBlur = 26;
  g.strokeRect(4, 4, w - 8, h - 8);
}, { repeat: [3, 1] });

/* フォルダ柱 */
const pillarTex = canvasTex(512, 1024, (g, w, h) => {
  g.fillStyle = '#141005'; g.fillRect(0, 0, w, h);
  g.fillStyle = 'rgba(255,200,61,0.16)';
  for (let y = 60; y < h; y += 240) {
    g.beginPath();
    g.moveTo(120, y); g.lineTo(220, y); g.lineTo(250, y + 34); g.lineTo(392, y + 34);
    g.lineTo(392, y + 160); g.lineTo(120, y + 160); g.closePath();
    g.fill();
  }
  g.strokeStyle = C.yellow; g.lineWidth = 10;
  g.shadowColor = C.yellow; g.shadowBlur = 28;
  g.strokeRect(5, 5, w - 10, h - 10);
});

/* Apple アリーナ床 */
const appleFloorTex = canvasTex(1024, 1024, (g, w, h) => {
  const rad = g.createRadialGradient(w/2, h/2, 60, w/2, h/2, w/2);
  rad.addColorStop(0, '#FAFAFC');
  rad.addColorStop(0.72, '#E8E8ED');
  rad.addColorStop(1, '#C9CBD3');
  g.fillStyle = rad; g.fillRect(0, 0, w, h);
  g.strokeStyle = 'rgba(232,17,35,0.55)'; g.lineWidth = 6;
  g.shadowColor = C.red; g.shadowBlur = 20;
  g.beginPath(); g.arc(w/2, h/2, 150, 0, Math.PI * 2); g.stroke();
  g.beginPath(); g.arc(w/2, h/2, 170, 0, Math.PI * 2);
  g.strokeStyle = 'rgba(232,17,35,0.2)'; g.stroke();
});

/* UAC ゲート：アクセス許可ダイアログ */
const uacTex = canvasTex(1024, 640, (g, w, h) => {
  g.fillStyle = 'rgba(8,12,20,0.96)'; g.fillRect(0, 0, w, h);
  /* タイトルバー（黄帯＝UAC風） */
  const grad = g.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, '#3A2E08'); grad.addColorStop(1, '#141005');
  g.fillStyle = grad; g.fillRect(0, 0, w, 90);
  g.font = '600 40px "Segoe UI", sans-serif';
  g.fillStyle = C.yellow;
  g.shadowColor = C.yellow; g.shadowBlur = 14;
  g.fillText('⛨ ユーザー アカウント制御', 36, 60);
  g.shadowBlur = 0;
  g.font = '400 34px "Segoe UI", sans-serif';
  g.fillStyle = '#C9D4E3';
  g.fillText('このフォルダーへ移動するには、区画内の', 60, 190);
  g.fillText('すべての敵プロセスの終了が必要です。', 60, 245);
  g.font = '400 28px Consolas, monospace';
  g.fillStyle = '#5A6B80';
  g.fillText('target: C:\\Program Files\\Apple\\', 60, 320);
  /* ボタン */
  g.strokeStyle = '#3A4A5E'; g.lineWidth = 3;
  g.strokeRect(560, 480, 190, 80);
  g.fillStyle = '#5A6B80';
  g.font = '600 34px "Segoe UI", sans-serif';
  g.textAlign = 'center';
  g.fillText('いいえ', 655, 532);
  g.fillStyle = 'rgba(0,164,239,0.25)';
  g.fillRect(780, 480, 190, 80);
  g.strokeStyle = C.blue;
  g.shadowColor = C.blue; g.shadowBlur = 18;
  g.strokeRect(780, 480, 190, 80);
  g.fillStyle = '#E8F2FC';
  g.fillText('はい', 875, 532);
  g.shadowBlur = 0;
  g.textAlign = 'left';
  /* 外枠 */
  g.strokeStyle = C.yellow; g.lineWidth = 8;
  g.shadowColor = C.yellow; g.shadowBlur = 26;
  g.strokeRect(4, 4, w - 8, h - 8);
});

/* Temp の宝箱アイテム用 */
const tempSignTex = canvasTex(512, 256, (g, w, h) => {
  g.fillStyle = 'rgba(10,16,26,0.9)'; g.fillRect(0, 0, w, h);
  g.font = '600 64px Consolas, monospace';
  g.textAlign = 'center';
  g.fillStyle = C.yellow;
  g.shadowColor = C.yellow; g.shadowBlur = 22;
  g.fillText('Temp\\', w/2, 105);
  g.font = '400 34px Consolas, monospace';
  g.fillStyle = '#8FA0B5'; g.shadowBlur = 0;
  g.fillText('(行き止まり・回復アイテム)', w/2, 185);
  g.strokeStyle = C.yellow; g.lineWidth = 6;
  g.shadowColor = C.yellow; g.shadowBlur = 18;
  g.strokeRect(3, 3, w - 6, h - 6);
});

/* =========================================================
 * ステージ構築ヘルパー
 * ======================================================= */
const stage = new THREE.Group();
scene.add(stage);

const DEG = Math.PI / 180;
const SLOPE_DEG = 13;
const mat = (opt) => new THREE.MeshStandardMaterial(Object.assign({ roughness: 0.85, metalness: 0.05 }, opt));
const emissiveMat = (tex, intensity, extra = {}) =>
  mat(Object.assign({ map: tex, emissiveMap: tex, emissive: 0xffffff, emissiveIntensity: intensity }, extra));

function box(w, h, d, m) { return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m); }

function addFloor(cx, cy, cz, sx, sz, tex = folderFloorTex, glow = 0.5) {
  const f = box(sx, 24, sz, emissiveMat(tex, glow));
  f.position.set(cx, cy - 12, cz);
  stage.add(f);
  return f;
}

/* 坂：始点（床の縁・上面高さ）から axis 方向へ下る。終点情報を返す */
function addSlope(startX, topY, startZ, len, width, axis /* 'z+'|'x-'|'x+' */, tex) {
  const drop = len * Math.sin(SLOPE_DEG * DEG);
  const span = len * Math.cos(SLOPE_DEG * DEG);
  const s = box(width, 24, len, emissiveMat(tex, 0.8));
  if (axis === 'z+') {
    s.position.set(startX, topY - 12 - drop / 2, startZ + span / 2);
    s.rotation.x = SLOPE_DEG * DEG;
    stage.add(s);
    return { x: startX, y: topY - drop, z: startZ + span, mesh: s };
  }
  if (axis === 'x-') {
    s.position.set(startX - span / 2, topY - 12 - drop / 2, startZ);
    s.rotation.y = Math.PI / 2;
    s.rotation.x = -SLOPE_DEG * DEG;   /* -x 方向へ下る */
    stage.add(s);
    return { x: startX - span, y: topY - drop, z: startZ, mesh: s };
  }
  /* 'x+' */
  s.position.set(startX + span / 2, topY - 12 - drop / 2, startZ);
  s.rotation.y = Math.PI / 2;
  s.rotation.x = SLOPE_DEG * DEG;
  stage.add(s);
  return { x: startX + span, y: topY - drop, z: startZ, mesh: s };
}

/* System32 のクランク通路：床＋両側の .dll 壁 */
function addCorridor(cx, cy, cz, len, axis /* 'z'|'x' */, width = 1000, wallH = 620) {
  const alongZ = axis === 'z';
  addFloor(cx, cy, cz, alongZ ? width : len, alongZ ? len : width, sys32FloorTex, 0.55);
  for (const side of [-1, 1]) {
    const w = box(len, wallH, 30, emissiveMat(dllWallTex, 0.5));
    if (alongZ) {
      w.position.set(cx + side * (width / 2 + 15), cy + wallH / 2, cz);
      w.rotation.y = Math.PI / 2;
    } else {
      w.position.set(cx, cy + wallH / 2, cz + side * (width / 2 + 15));
    }
    stage.add(w);
  }
}

function addPillar(x, floorY, z) {
  const p = box(240, 620, 240, emissiveMat(pillarTex, 0.55));
  p.position.set(x, floorY + 310, z);
  stage.add(p);
}

function addBlock(tex, x, floorY, z, ry = 0, size = 220, lift = 0) {
  const b = box(size, size, size, emissiveMat(tex, 0.45));
  b.position.set(x, floorY + size / 2 + lift, z);
  b.rotation.y = ry;
  stage.add(b);
}

function addWindowWall(title, cx, cy, cz, w, h, ry = 0) {
  const t = windowWallTex(title);
  const m = box(w, h, 40, emissiveMat(t, 0.52, { transparent: true, opacity: 0.94 }));
  m.position.set(cx, cy + h / 2, cz);
  m.rotation.y = ry;
  stage.add(m);
}

/* =========================================================
 * ルート構築（5区画）
 *   ① Desktop → 坂A → ② Downloads → 90°通路 → つづら折り坂B1/B2
 *   → ③ System32（クランク）→ 坂C → ④ Program Files → UACゲート
 *   → 坂D（青→白銀）→ ⑤ Apple アリーナ
 * ======================================================= */

/* ---- ① Desktop ---- */
const Y1 = 0;
addFloor(0, Y1, 0, 2600, 2600);
addWindowWall('C:\\Users\\Player\\Desktop', 0, Y1, -1350, 3000, 1500);
addBlock(texTxt, -900, Y1, -700, 0.4);
addBlock(texExe, 950, Y1, -800, -0.3);

/* ---- 坂A（直線） ---- */
const sA = addSlope(0, Y1, 1300, 2600, 1000, 'z+', pathTexA);

/* ---- ② Downloads ---- */
const Y2 = sA.y;
const R2Z = sA.z + 1400;
addFloor(0, Y2, R2Z, 2800, 2800);
addWindowWall('C:\\Users\\Player\\Downloads', -1420, Y2, R2Z, 2800, 1400, Math.PI / 2);
/* .zip が散乱 */
addBlock(texZip, -700, Y2, R2Z - 500, 0.5);
addBlock(texZip, -450, Y2, R2Z - 350, -0.8);
addBlock(texZip, -580, Y2, R2Z - 430, 0.1, 220, 220);
addBlock(texZip, 800, Y2, R2Z + 600, 1.1);
addBlock(texTxt, 300, Y2, R2Z + 900, -0.5);

/* ---- 90°ターン：+x へ平通路 ---- */
const T1X = 1400, T1LEN = 1900;
addFloor(T1X + T1LEN / 2, Y2, R2Z + 500, T1LEN, 1000);
const J1X = T1X + T1LEN + 500;           /* ターン踊り場 */
addFloor(J1X, Y2, R2Z + 500, 1000, 1000);

/* ---- つづら折り坂 B1（+z へ下る）→ 踊り場 → B2（-x へ下る） ---- */
const sB1 = addSlope(J1X, Y2, R2Z + 1000, 2000, 1000, 'z+', pathTexA);
const J2Z = sB1.z + 500;
addFloor(J1X, sB1.y, J2Z, 1000, 1000);
const sB2 = addSlope(J1X - 500, sB1.y, J2Z, 2000, 1000, 'x-', pathTexB);
const Y3 = sB2.y;
const J3X = sB2.x - 500;
addFloor(J3X, Y3, J2Z, 1000, 1000);

/* ---- ③ System32：クランク通路 ---- */
/* C1: +z */
const C1LEN = 2400;
addCorridor(J3X, Y3, J2Z + 500 + C1LEN / 2, C1LEN, 'z');
const J4Z = J2Z + 500 + C1LEN + 500;
addFloor(J3X, Y3, J4Z, 1000, 1000, sys32FloorTex, 0.55);
/* C2: -x */
const C2LEN = 2000;
addCorridor(J3X - 500 - C2LEN / 2, Y3, J4Z, C2LEN, 'x');
const J5X = J3X - 500 - C2LEN - 500;
addFloor(J5X, Y3, J4Z, 1000, 1000, sys32FloorTex, 0.55);
/* 寄り道：さらに -x へ行き止まりの Temp\ */
const TEMP_X = J5X - 500 - 700 - 600;
addFloor(J5X - 500 - 350, Y3, J4Z, 700, 800, sys32FloorTex, 0.4);   /* 短い接続 */
addFloor(TEMP_X, Y3, J4Z, 1200, 1200);
{
  const sign = box(500, 250, 20, emissiveMat(tempSignTex, 0.8, { transparent: true }));
  sign.position.set(TEMP_X, Y3 + 520, J4Z - 590);
  stage.add(sign);
  /* 回復アイテム（黄色いオーブ） */
  const orb = new THREE.Mesh(
    new THREE.IcosahedronGeometry(70, 1),
    mat({ color: C.yellow, emissive: C.yellow, emissiveIntensity: 2.0 })

  orb.position.set(TEMP_X, Y3 + 160, J4Z);
  orb.userData.spin = true;
  stage.add(orb);
  window.__tempOrb = orb;
}
/* C3: +z（本ルート続き） */
const C3LEN = 2400;
addCorridor(J5X, Y3, J4Z + 500 + C3LEN / 2, C3LEN, 'z');
const J6Z = J4Z + 500 + C3LEN + 500;
addFloor(J5X, Y3, J6Z, 1000, 1000, sys32FloorTex, 0.55);

/* ---- 坂C ---- */
const sC = addSlope(J5X, Y3, J6Z + 500, 2600, 1000, 'z+', pathTexC);

/* ---- ④ Program Files（主戦場） ---- */
const Y4 = sC.y;
const R4Z = sC.z + 1800;
const R4X = J5X;
addFloor(R4X, Y4, R4Z, 3800, 3600);
const wallPF = 'C:\\Program Files';
addWindowWall(wallPF, R4X - 1920, Y4, R4Z, 3600, 1500, Math.PI / 2);
addWindowWall(wallPF, R4X + 1920, Y4, R4Z, 3600, 1500, -Math.PI / 2);
for (const [dx, dz] of [[-900, -800], [900, -700], [-800, 900], [950, 850]]) addPillar(R4X + dx, Y4, R4Z + dz);
addBlock(texExe, R4X - 1400, Y4, R4Z + 100, 0.3);
addBlock(texDllB, R4X - 1290, Y4, R4Z + 240, -0.4);
addBlock(texExe, R4X - 1350, Y4, R4Z + 170, 0.9, 220, 220);
addBlock(texDllB, R4X + 1350, Y4, R4Z - 200, 0.6);
addBlock(texTxt, R4X + 1420, Y4, R4Z - 60, -0.7);
addBlock(texExe, R4X + 200, Y4, R4Z + 1300, 0.2);

/* ---- UAC ゲート（区画の出口） ---- */
const GATE_Z = R4Z + 1800;
{
  /* 左右の門柱壁＋中央上にダイアログ */
  for (const side of [-1, 1]) {
    const w = box(1450, 1300, 60, emissiveMat(dllWallTex, 0.4));
    w.position.set(R4X + side * (500 + 725), Y4 + 650, GATE_Z);
    stage.add(w);

  const dlg = box(1100, 688, 30, emissiveMat(uacTex, 0.85, { transparent: true }));

}

/* ---- 坂D（青 → 白銀） ---- */
const sD = addSlope(R4X, Y4, GATE_Z + 100, 2600, 1000, 'z+', pathTexC);

/* ---- ⑤ Apple アリーナ ---- */
const Y5 = sD.y;
const R5Z = sD.z + 1500;
const arena = new THREE.Mesh(
  new THREE.CylinderGeometry(1550, 1550, 24, 72),

);
arena.position.set(R4X, Y5 - 12, R5Z);
stage.add(arena);
const ring = new THREE.Mesh(
  new THREE.TorusGeometry(1550, 14, 12, 96),

);
ring.rotation.x = Math.PI / 2;
ring.position.set(R4X, Y5 + 4, R5Z);

/* 序盤から見える「彼方の白い光」：アリーナ上空の発光体 */
{
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(220, 24, 24),
    mat({ color: C.apple2, emissive: C.apple2, emissiveIntensity: 3.0, transparent: true, opacity: 0.9 })
  );

  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(60, 200, 2800, 24, 1, true),

  );

}

/* =========================================================
 * キャラクター
 * ======================================================= */
const actors = [];
function actor(w, h, d, color, x, floorY, z, opts = {}) {
  const m = box(w, h, d, mat({ color, emissive: color, emissiveIntensity: opts.glow ?? 0.5, roughness: 0.6, transparent: true, opacity: 0.95 }));
  m.position.set(x, floorY + h / 2, z);
  stage.add(m);
  actors.push({ mesh: m, baseY: floorY + h / 2, phase: Math.random() * 6.28, bob: 24 });
  return m;
}
/* ① Desktop: 雑魚1〜2 */
actor(200, 300, 200, '#4DA6FF', -500, Y1, 300);
actor(200, 300, 200, '#4DA6FF', 550, Y1, 150);
/* ② Downloads: 2〜3 */
actor(200, 300, 200, '#4DA6FF', -600, Y2, R2Z + 400);
actor(200, 300, 200, '#4DA6FF', 700, Y2, R2Z - 300);
actor(220, 400, 220, '#1E90FF', 100, Y2, R2Z + 900, { glow: 0.55 });
/* ③ System32: 通路に少数（緊張ゾーン） */
actor(200, 300, 200, '#4DA6FF', J3X, Y3, J2Z + 1700);
actor(220, 400, 220, '#1E90FF', J5X, Y3, J4Z + 1600, { glow: 0.55 });
/* ④ Program Files: 主戦場 5〜7 */
actor(200, 300, 200, '#4DA6FF', R4X - 1000, Y4, R4Z - 400);
actor(200, 300, 200, '#4DA6FF', R4X + 1100, Y4, R4Z + 300);
actor(200, 300, 200, '#4DA6FF', R4X - 300, Y4, R4Z + 1100);
actor(200, 300, 200, '#4DA6FF', R4X + 400, Y4, R4Z - 1100);
actor(220, 400, 220, '#1E90FF', R4X + 500, Y4, R4Z - 900, { glow: 0.55 });
actor(220, 400, 220, '#1E90FF', R4X - 1300, Y4, R4Z + 700, { glow: 0.55 });

/* MacBook（ボス） */
const macGroup = new THREE.Group();
{
  const body = box(520, 40, 380, mat({ color: C.apple, emissive: C.apple, emissiveIntensity: 0.35, metalness: 0.7, roughness: 0.25 }));
  body.position.y = 20;
  const screen = box(520, 360, 24, mat({ color: C.apple2, emissive: C.apple2, emissiveIntensity: 0.4, metalness: 0.7, roughness: 0.25 }));
  screen.position.set(0, 200, -180);
  screen.rotation.x = -0.32;
  const face = box(470, 310, 6, mat({ color: '#1A0508', emissive: C.red, emissiveIntensity: 1.6 }));
  face.position.set(0, 200, -167);
  face.rotation.x = -0.32;
  macGroup.add(body, screen, face);
  macGroup.scale.setScalar(1.35);
  macGroup.position.set(R4X, Y5, R5Z);
  stage.add(macGroup);
}
const dangerRing = new THREE.Mesh(
  new THREE.TorusGeometry(420, 8, 10, 72),
  mat({ color: C.red, emissive: C.red, emissiveIntensity: 2.2, transparent: true, opacity: 0.9 })
);
dangerRing.rotation.x = Math.PI / 2;
dangerRing.position.set(R4X, Y5 + 10, R5Z);
stage.add(dangerRing);

/* =========================================================
 * ライティング
 * ======================================================= */
function pt(color, intensity, dist, x, y, z) {
  const l = new THREE.PointLight(color, intensity, dist, 1.6);
  l.position.set(x, y, z);
  scene.add(l);
}
pt(C.blue, 90000, 6000, 0, Y1 + 900, 0);                       /* Desktop */
pt(C.blue, 110000, 6000, 0, Y2 + 900, R2Z);                    /* Downloads */
pt(C.yellow, 26000, 2200, TEMP_X, Y3 + 600, J4Z);              /* Temp */
pt(C.blue, 80000, 5000, J3X, Y3 + 800, J4Z);                   /* System32 前半 */
pt(C.blue, 80000, 5000, J5X, Y3 + 800, J4Z + 1800);            /* System32 後半 */
pt(C.blue, 150000, 7000, R4X, Y4 + 1000, R4Z);                 /* Program Files */
pt(C.yellow, 30000, 2500, R4X - 900, Y4 + 800, R4Z - 800);
pt(C.yellow, 30000, 2500, R4X + 950, Y4 + 800, R4Z + 850);
pt(C.yellow, 45000, 3000, R4X, Y4 + 1100, GATE_Z);             /* UAC ゲート */
pt('#FFFFFF', 260000, 8000, R4X, Y5 + 1600, R5Z);              /* アリーナ */
pt(C.red, 60000, 3000, R4X, Y5 + 300, R5Z);

/* =========================================================
 * 虚無を漂うデータ片
 * ======================================================= */
const PCOUNT = 1300;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PCOUNT * 3);
for (let i = 0; i < PCOUNT; i++) {
  pPos[i*3]   = (Math.random() - 0.5) * 18000 - 1000;
  pPos[i*3+1] = (Math.random() - 0.5) * 8000 - 1400;
  pPos[i*3+2] = Math.random() * 30000 - 3000;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const points = new THREE.Points(pGeo, new THREE.PointsMaterial({
  color: C.blue, size: 12, transparent: true, opacity: 0.5, sizeAttenuation: true
}));
scene.add(points);

/* =========================================================
 * カメラ：シネマティック巡回 ⇄ 自由視点
 * ======================================================= */
const tourCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 800, -2900),                            /* 開幕：遠景に白い光 */
  new THREE.Vector3(-700, 450, 0),
  new THREE.Vector3(200, 200, 2200),                           /* 坂A */
  new THREE.Vector3(-500, Y2 + 450, R2Z - 300),                /* Downloads */
  new THREE.Vector3(900, Y2 + 380, R2Z + 500),
  new THREE.Vector3(T1X + 1000, Y2 + 350, R2Z + 500),          /* 90°通路 */
  new THREE.Vector3(J1X, Y2 + 300, R2Z + 1400),                /* 坂B1へ */
  new THREE.Vector3(J1X, sB1.y + 350, J2Z),                    /* 踊り場（見下ろし） */
  new THREE.Vector3(J1X - 1200, Y3 + 400, J2Z),                /* 坂B2 */
  new THREE.Vector3(J3X, Y3 + 320, J2Z + 1200),                /* System32 C1 */
  new THREE.Vector3(J3X, Y3 + 320, J4Z - 300),
  new THREE.Vector3(J3X - 1300, Y3 + 320, J4Z),                /* C2 クランク */
  new THREE.Vector3(TEMP_X + 400, Y3 + 350, J4Z),              /* Temp 寄り道ちら見せ */
  new THREE.Vector3(J5X, Y3 + 320, J4Z + 1300),                /* C3 */
  new THREE.Vector3(J5X, Y3 + 250, J6Z + 900),                 /* 坂C */
  new THREE.Vector3(R4X - 1300, Y4 + 500, R4Z - 700),          /* Program Files */
  new THREE.Vector3(R4X + 1000, Y4 + 420, R4Z + 800),
  new THREE.Vector3(R4X, Y4 + 600, GATE_Z - 900),              /* UAC ゲートへ */
  new THREE.Vector3(R4X, Y4 + 300, GATE_Z + 600),              /* ゲート通過 */
  new THREE.Vector3(R4X - 900, Y5 + 500, R5Z - 800),           /* アリーナ */
  new THREE.Vector3(R4X, Y5 + 1000, R5Z + 1500),
  new THREE.Vector3(R4X + 1700, Y5 + 1500, R5Z - 300),
  new THREE.Vector3(0, 1800, 12000),                           /* 全景の引き */
  new THREE.Vector3(0, 1400, 2000)
], true, 'catmullrom', 0.3);

let mode = 'tour';
let tourT = 0;
const TOUR_SPEED = 1 / 110;      /* 一周 110 秒 */

let yaw = 0, pitch = -0.15, dragging = false;
const keys = new Set();
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (mode !== 'fly') return;
  dragging = true;
  renderer.domElement.setPointerCapture(e.pointerId);
});
window.addEventListener('pointerup', () => dragging = false);
renderer.domElement.addEventListener('pointermove', (e) => {
  if (mode !== 'fly' || !dragging) return;
  yaw   -= e.movementX * 0.0032;
  pitch -= e.movementY * 0.0032;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});
window.addEventListener('keydown', e => keys.add(e.code));
window.addEventListener('keyup', e => keys.delete(e.code));
window.addEventListener('blur', () => keys.clear());

const btnTour = document.getElementById('btnTour');
const btnFly = document.getElementById('btnFly');
function setMode(m) {
  mode = m;
  btnTour.classList.toggle('active', m === 'tour');
  btnFly.classList.toggle('active', m === 'fly');
  document.getElementById('flyHint').style.display = m === 'fly' ? 'block' : 'none';
  if (m === 'fly') {
    const e = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
    yaw = e.y; pitch = e.x;
  }
}
btnTour.onclick = () => setMode('tour');
btnFly.onclick = () => setMode('fly');

/* =========================================================
 * ゾーン表示（カメラ位置 → 区画名）
 * ======================================================= */
const zoneEl = document.getElementById('zone');
const depthEl = document.getElementById('depth');
let currentZone = '';
function zoneAt(p) {
  if (p.z > GATE_Z + 300 || (p.z > sD.mesh.position.z - 1000 && p.y < Y4 - 200)) return 'C:\\Program Files\\Apple\\';
  if (p.z > J6Z - 400) return 'C:\\Program Files\\';
  if (p.x < TEMP_X + 900 && Math.abs(p.z - J4Z) < 900) return 'C:\\Windows\\Temp\\';
  if (p.z > J2Z - 700) return 'C:\\Windows\\System32\\';
  if (p.z > 2600) return 'C:\\Users\\Player\\Downloads';
  return 'C:\\Users\\Player\\Desktop';
}
function updateZone(p) {
  const name = zoneAt(p);
  depthEl.textContent = 'DEPTH: ' + Math.max(0, -p.y / 100).toFixed(1) + 'm';
  if (name !== currentZone) {
    currentZone = name;
    zoneEl.style.opacity = 0;
    setTimeout(() => {
      const isApple = name.includes('Apple');
      const isTemp = name.includes('Temp');
      zoneEl.innerHTML = '<span class="path-prefix">CURRENT DIRECTORY</span>' + name;
      zoneEl.style.color = isApple ? '#F5F5F7' : (isTemp ? '#FFC83D' : '#E8F2FC');
      zoneEl.style.textShadow = isApple
        ? '0 0 18px rgba(232,17,35,0.5)'
        : (isTemp ? '0 0 18px rgba(255,200,61,0.5)' : '0 0 18px rgba(0,164,239,0.55)');
      zoneEl.style.opacity = 1;
    }, 400);
  }
}

/* =========================================================
 * ループ
 * ======================================================= */
let last = performance.now();
function tick(t) {
  requestAnimationFrame(tick);
  const dt = Math.min((t - last) / 1000, 0.1); last = t;
  const time = t / 1000;

  for (const tx of scrollTexes) tx.offset.y = (tx.offset.y - dt * 0.12) % 1;

  for (const a of actors) {
    a.mesh.position.y = a.baseY + Math.sin(time * 1.4 + a.phase) * a.bob;
    a.mesh.rotation.y += dt * 0.25;
  }
  dangerRing.scale.setScalar(1 + Math.sin(time * 2.2) * 0.05);
  dangerRing.material.emissiveIntensity = 1.8 + Math.sin(time * 2.2) * 0.7;
  macGroup.position.y = Y5 + Math.sin(time * 0.9) * 18;
  if (window.__tempOrb) {
    window.__tempOrb.rotation.y = time * 1.2;
    window.__tempOrb.position.y = Y3 + 160 + Math.sin(time * 2) * 20;
  }
  if (window.__uacDlg) {
    window.__uacDlg.material.emissiveIntensity = 0.75 + Math.sin(time * 1.8) * 0.2;
  }
  points.rotation.y = time * 0.004;

  if (mode === 'tour') {
    tourT = (tourT + dt * TOUR_SPEED) % 1;
    const pos = tourCurve.getPointAt(tourT);
    const ahead = tourCurve.getPointAt((tourT + 0.012) % 1);
    camera.position.lerp(pos, 0.9);
    camera.lookAt(ahead);
  } else {
    camera.rotation.order = 'YXZ';
    camera.rotation.set(pitch, yaw, 0);
    const speed = 2600 * (keys.has('ShiftLeft') || keys.has('ShiftRight') ? 3 : 1) * dt;
    const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    if (keys.has('KeyW')) camera.position.addScaledVector(fwd, speed);
    if (keys.has('KeyS')) camera.position.addScaledVector(fwd, -speed);
    if (keys.has('KeyA')) camera.position.addScaledVector(right, -speed);
    if (keys.has('KeyD')) camera.position.addScaledVector(right, speed);
    if (keys.has('KeyQ')) camera.position.y -= speed;
    if (keys.has('KeyE')) camera.position.y += speed;
  }

  /* アリーナ接近で眩しく */
  const dArena = Math.hypot(camera.position.x - R4X, camera.position.z - R5Z);
  bloom.strength = 0.7 + Math.max(0, 1 - dArena / 4500) * 0.45;

  updateZone(camera.position);
  composer.render();
}

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

resize();
requestAnimationFrame(tick);
setTimeout(() => document.getElementById('fade').style.opacity = 0, 200);
</script>
