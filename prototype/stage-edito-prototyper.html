<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Concept — C:\Program Files\Apple\</title>
<style>
  :root {
    --blue: #00A4EF;
    --yellow: #FFC83D;
    --red: #E81123;
    --text: #C9D4E3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; }
  body { font-family: "Segoe UI", "Yu Gothic UI", sans-serif; color: var(--text); }
  canvas { display: block; }

  #hud {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 22px 26px;
  }
  #title {
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 13px; letter-spacing: 1px; color: #5A6B80;
  }
  #title b { color: var(--blue); font-weight: 600; }
  #zone {
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 22px; margin-top: 6px; color: #E8F2FC;
    text-shadow: 0 0 18px rgba(0,164,239,0.55);
    transition: opacity 0.4s;
  }
  #zone .path-prefix { color: #5A6B80; font-size: 15px; display: block; margin-bottom: 2px; }
  #bottom { display: flex; align-items: flex-end; justify-content: space-between; }
  #desc { font-size: 12px; line-height: 1.7; color: #8FA0B5; max-width: 480px; }
  #controls { pointer-events: auto; display: flex; gap: 8px; }
  #controls button {
    background: rgba(17,22,31,0.85); color: var(--text);
    border: 1px solid #2A3547; border-radius: 4px;
    padding: 8px 16px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  #controls button:hover { border-color: var(--blue); }
  #controls button.active { border-color: var(--blue); color: #fff; background: rgba(0,95,138,0.6); }
  #flyHint {
    position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%);
    font-size: 11px; color: #5A6B80; display: none; pointer-events: none;
    font-family: "Cascadia Code", Consolas, monospace;
  }
  #fade {
    position: fixed; inset: 0; background: #000; pointer-events: none;
    opacity: 1; transition: opacity 1.6s ease; z-index: 5;
  }
</style>
</head>
<body>
<div id="fade"></div>
<div id="hud">
  <div>
    <div id="title">WIN vs MAC — STAGE CONCEPT <b>// 虚無に浮かぶ自分のPC</b></div>
    <div id="zone"><span class="path-prefix">CURRENT DIRECTORY</span>C:\Users\Player\Desktop</div>
  </div>
  <div id="bottom">
    <div id="desc">
      真っ黒な虚無に、床だけが浮かんでいる。<br>
      Desktop から坂を下り、Program Files の主戦場を抜けると、
      色が反転する——<b style="color:#E8E8ED">白銀の Apple 領域</b>。その最深部に MacBook が居座る。
    </div>
    <div id="controls">
      <button id="btnTour" class="active">シネマティック</button>
      <button id="btnFly">自由視点</button>
    </div>
  </div>
</div>
<div id="flyHint">ドラッグ: 視点 / WASD: 移動 / Q,E: 上下 / Shift: 加速</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* =========================================================
 * カラーパレット（要件定義書 2-3）
 * ======================================================= */
const C = {
  void1: '#000000', void2: '#0A0E14',
  blue: '#00A4EF', blueDim: '#005F8A',
  yellow: '#FFC83D',
  apple: '#E8E8ED', apple2: '#F5F5F7',
  red: '#E81123'
};

/* =========================================================
 * 基本セットアップ
 * ======================================================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(C.void1);
scene.fog = new THREE.FogExp2(0x000208, 0.000075);

const camera = new THREE.PerspectiveCamera(62, 1, 1, 60000);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.75, 0.5, 0.62);
composer.addPass(bloom);
composer.addPass(new OutputPass());

scene.add(new THREE.AmbientLight(0x223044, 0.9));

/* =========================================================
 * Canvas テクスチャ工房
 *  ── DxLib移植時は「発光して見えるテクスチャを描く」方針の
 *     具体イメージとして、全てテクスチャで表現している
 * ======================================================= */
function canvasTex(w, h, draw, opts = {}) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  draw(cv.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  if (opts.repeat) { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(...opts.repeat); }
  return t;
}

/* フォルダ床：エクスプローラー詳細表示の等間隔ライン＋青発光縁 */
const folderFloorTex = canvasTex(1024, 1024, (g, w, h) => {
  g.fillStyle = '#070C13'; g.fillRect(0, 0, w, h);
  for (let y = 40; y < h; y += 64) {
    g.fillStyle = 'rgba(0,164,239,0.10)'; g.fillRect(24, y, w - 48, 2);
    /* 行の左に小さなフォルダアイコン風の点 */
    g.fillStyle = 'rgba(255,200,61,0.35)'; g.fillRect(40, y - 14, 18, 12);
    g.fillStyle = 'rgba(0,164,239,0.25)';
    g.fillRect(70, y - 12, 180 + (y * 7) % 240, 8);
  }
  /* 発光する縁 */
  g.strokeStyle = C.blue; g.lineWidth = 10;
  g.shadowColor = C.blue; g.shadowBlur = 30;
  g.strokeRect(6, 6, w - 12, h - 12);
});

/* パス通路：C:\Users\... の文字が流れる */
const pathTex = canvasTex(512, 1024, (g, w, h) => {
  g.fillStyle = '#060A10'; g.fillRect(0, 0, w, h);
  g.font = '600 44px Consolas, monospace';
  g.textAlign = 'center';
  const lines = ['C:\\Users\\Player\\', 'Desktop  >  ..\\..', 'C:\\Program Files\\', '>  >  >'];
  for (let i = 0; i < 8; i++) {
    g.fillStyle = i % 2 ? 'rgba(0,164,239,0.85)' : 'rgba(0,164,239,0.35)';
    g.shadowColor = C.blue; g.shadowBlur = 18;
    g.fillText(lines[i % lines.length], w / 2, 90 + i * 128);
  }
  g.shadowBlur = 0;
  g.strokeStyle = 'rgba(0,164,239,0.9)'; g.lineWidth = 8;
  g.strokeRect(4, 0, w - 8, h);
}, { repeat: [1, 2] });

/* ウィンドウ壁：巨大エクスプローラー枠、右上に − □ ✕ */
function windowWallTex(title) {
  return canvasTex(2048, 1024, (g, w, h) => {
    g.fillStyle = 'rgba(10,16,26,0.94)'; g.fillRect(0, 0, w, h);
    /* タイトルバー */
    g.fillStyle = '#0E1622'; g.fillRect(0, 0, w, 110);
    g.font = '600 46px Consolas, monospace';
    g.fillStyle = 'rgba(201,212,227,0.9)';
    g.textBaseline = 'middle';
    g.fillText('📁 ' + title, 46, 56);
    /* − □ ✕ */
    g.font = '400 52px "Segoe UI", sans-serif';
    g.textAlign = 'center';
    g.fillStyle = '#8FA0B5';
    g.fillText('—', w - 300, 52);
    g.strokeStyle = '#8FA0B5'; g.lineWidth = 5;
    g.strokeRect(w - 216, 30, 44, 44);
    g.fillStyle = C.red;
    g.shadowColor = C.red; g.shadowBlur = 24;
    g.font = '600 56px "Segoe UI", sans-serif';
    g.fillText('✕', w - 90, 54);
    g.shadowBlur = 0;
    /* 本体うっすらグリッド */
    g.strokeStyle = 'rgba(0,164,239,0.07)'; g.lineWidth = 2;
    for (let x = 0; x < w; x += 128) { g.beginPath(); g.moveTo(x, 110); g.lineTo(x, h); g.stroke(); }
    for (let y = 110; y < h; y += 128) { g.beginPath(); g.moveTo(0, y); g.lineTo(w, y); g.stroke(); }
    /* 発光する外枠 */
    g.strokeStyle = C.blue; g.lineWidth = 10;
    g.shadowColor = C.blue; g.shadowBlur = 34;
    g.strokeRect(5, 5, w - 10, h - 10);
    g.textAlign = 'left';
  });
}

/* ファイルブロック */
function fileBlockTex(ext, color) {
  return canvasTex(512, 512, (g, w, h) => {
    g.fillStyle = '#0B1420'; g.fillRect(0, 0, w, h);
    g.strokeStyle = color; g.lineWidth = 8;
    g.shadowColor = color; g.shadowBlur = 22;
    g.strokeRect(4, 4, w - 8, h - 8);
    g.shadowBlur = 0;
    /* 紙アイコン */
    g.fillStyle = 'rgba(201,212,227,0.12)';
    g.fillRect(w/2 - 90, 90, 180, 220);
    g.beginPath(); g.moveTo(w/2 + 40, 90); g.lineTo(w/2 + 90, 140); g.lineTo(w/2 + 40, 140); g.closePath();
    g.fillStyle = 'rgba(201,212,227,0.25)'; g.fill();
    g.font = '600 84px Consolas, monospace';
    g.textAlign = 'center';
    g.fillStyle = color;
    g.shadowColor = color; g.shadowBlur = 16;
    g.fillText(ext, w/2, 420);
  });
}

/* フォルダ柱（黄） */
const pillarTex = canvasTex(512, 1024, (g, w, h) => {
  g.fillStyle = '#141005'; g.fillRect(0, 0, w, h);
  g.fillStyle = 'rgba(255,200,61,0.16)';
  /* フォルダ形シルエットを縦に */
  for (let y = 60; y < h; y += 240) {
    g.beginPath();
    g.moveTo(120, y); g.lineTo(220, y); g.lineTo(250, y + 34); g.lineTo(392, y + 34);
    g.lineTo(392, y + 160); g.lineTo(120, y + 160); g.closePath();
    g.fill();
  }
  g.strokeStyle = C.yellow; g.lineWidth = 10;
  g.shadowColor = C.yellow; g.shadowBlur = 28;
  g.strokeRect(5, 5, w - 10, h - 10);
});

/* Apple アリーナ床：白銀・継ぎ目なし */
const appleFloorTex = canvasTex(1024, 1024, (g, w, h) => {
  const rad = g.createRadialGradient(w/2, h/2, 60, w/2, h/2, w/2);
  rad.addColorStop(0, '#FAFAFC');
  rad.addColorStop(0.72, '#E8E8ED');
  rad.addColorStop(1, '#C9CBD3');
  g.fillStyle = rad; g.fillRect(0, 0, w, h);
  /* 中央に赤い危険サークル */
  g.strokeStyle = 'rgba(232,17,35,0.55)'; g.lineWidth = 6;
  g.shadowColor = C.red; g.shadowBlur = 20;
  g.beginPath(); g.arc(w/2, h/2, 150, 0, Math.PI * 2); g.stroke();
  g.beginPath(); g.arc(w/2, h/2, 170, 0, Math.PI * 2);
  g.strokeStyle = 'rgba(232,17,35,0.2)'; g.stroke();
});

/* =========================================================
 * ステージ構築（3区画・一本道）
 *  スケール感は要件 3-1 準拠（1ユニット≒1cm / 通路幅1000 / アリーナ径3000）
 * ======================================================= */
const stage = new THREE.Group();
scene.add(stage);

const SLOPE_DEG = 13;
const SLOPE_LEN = 2600;
const SLOPE_DROP = SLOPE_LEN * Math.sin(SLOPE_DEG * Math.PI / 180);
const SLOPE_SPAN = SLOPE_LEN * Math.cos(SLOPE_DEG * Math.PI / 180);

function box(w, h, d, mat) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
}
const mat = (opt) => new THREE.MeshStandardMaterial(Object.assign({ roughness: 0.85, metalness: 0.05 }, opt));

/* ---- ① Desktop ---- */
const z1Y = 0;
const floor1 = box(2600, 24, 2600, mat({ map: folderFloorTex, emissiveMap: folderFloorTex, emissive: 0xffffff, emissiveIntensity: 0.5 }));
floor1.position.set(0, z1Y - 12, 0);
stage.add(floor1);

const wall1 = box(3000, 1500, 40, mat({ map: windowWallTex('C:\\Users\\Player\\Desktop'), emissiveMap: windowWallTex('C:\\Users\\Player\\Desktop'), emissive: 0xffffff, emissiveIntensity: 0.55, transparent: true, opacity: 0.96 }));
wall1.position.set(0, z1Y + 750, -1350);
stage.add(wall1);

/* ---- 坂1 ---- */
const slope1 = box(1000, 24, SLOPE_LEN, mat({ map: pathTex, emissiveMap: pathTex, emissive: 0xffffff, emissiveIntensity: 0.8 }));
slope1.position.set(0, z1Y - 12 - SLOPE_DROP / 2, 1300 + SLOPE_SPAN / 2);
slope1.rotation.x = SLOPE_DEG * Math.PI / 180;
stage.add(slope1);

/* ---- ② Program Files（主戦場） ---- */
const z2Y = z1Y - SLOPE_DROP;
const z2Z = 1300 + SLOPE_SPAN + 1800;
const floor2 = box(3800, 24, 3600, mat({ map: folderFloorTex, emissiveMap: folderFloorTex, emissive: 0xffffff, emissiveIntensity: 0.5 }));
floor2.position.set(0, z2Y - 12, z2Z);
stage.add(floor2);

const wallTexPF = windowWallTex('C:\\Program Files');
for (const [x, z, ry] of [[-1920, z2Z, Math.PI/2], [1920, z2Z, -Math.PI/2]]) {
  const w = box(3600, 1500, 40, mat({ map: wallTexPF, emissiveMap: wallTexPF, emissive: 0xffffff, emissiveIntensity: 0.5, transparent: true, opacity: 0.94 }));
  w.position.set(x, z2Y + 750, z);
  w.rotation.y = ry;
  stage.add(w);
}

/* フォルダ柱（遮蔽物） */
for (const [x, z] of [[-900, z2Z - 800], [900, z2Z - 700], [-800, z2Z + 900], [950, z2Z + 850]]) {
  const p = box(240, 620, 240, mat({ map: pillarTex, emissiveMap: pillarTex, emissive: 0xffffff, emissiveIntensity: 0.55 }));
  p.position.set(x, z2Y + 310, z);
  stage.add(p);
}

/* ファイルブロックの山 */
const exts = [['.exe', C.blue], ['.dll', '#8FA6BF'], ['.txt', '#C9D4E3']];
let bi = 0;
for (const [bx, bz, n] of [[-1400, z2Z + 100, 3], [1350, z2Z - 200, 2], [200, z2Z + 1300, 2]]) {
  for (let i = 0; i < n; i++) {
    const [ext, col] = exts[bi++ % exts.length];
    const t = fileBlockTex(ext, col);
    const b = box(220, 220, 220, mat({ map: t, emissiveMap: t, emissive: 0xffffff, emissiveIntensity: 0.45 }));
    b.position.set(bx + (i % 2) * 120 - 40, z2Y + 110 + Math.floor(i / 1) * 0, bz + i * 140);
    if (i === n - 1 && n > 1) b.position.set(bx + 40, z2Y + 330, bz + 70); /* 一段積む */
    b.rotation.y = (bi * 0.7) % 1.2 - 0.6;
    stage.add(b);
  }
}

/* ---- 坂2（青 → 白銀への遷移） ---- */
const z3StartZ = z2Z + 1800;
const slope2 = box(1000, 24, SLOPE_LEN, mat({ map: pathTex, emissiveMap: pathTex, emissive: 0xffffff, emissiveIntensity: 0.8 }));
slope2.position.set(0, z2Y - 12 - SLOPE_DROP / 2, z3StartZ + SLOPE_SPAN / 2);
slope2.rotation.x = SLOPE_DEG * Math.PI / 180;
stage.add(slope2);

/* ---- ③ Apple 領域（ボスアリーナ） ---- */
const z3Y = z2Y - SLOPE_DROP;
const z3Z = z3StartZ + SLOPE_SPAN + 1500;
const arena = new THREE.Mesh(
  new THREE.CylinderGeometry(1550, 1550, 24, 72),
  mat({ map: appleFloorTex, emissiveMap: appleFloorTex, emissive: 0xffffff, emissiveIntensity: 0.32, roughness: 0.35, metalness: 0.25 })
);
arena.position.set(0, z3Y - 12, z3Z);
stage.add(arena);

/* アリーナ縁の白銀リング */
const ring = new THREE.Mesh(
  new THREE.TorusGeometry(1550, 14, 12, 96),
  mat({ color: C.apple2, emissive: C.apple2, emissiveIntensity: 1.4, roughness: 0.3 })
);
ring.rotation.x = Math.PI / 2;
ring.position.set(0, z3Y + 4, z3Z);
stage.add(ring);

/* =========================================================
 * キャラクター（グレーボックス表現＋発光）
 * ======================================================= */
const actors = [];
function actor(w, h, d, color, x, y, z, opts = {}) {
  const m = box(w, h, d, mat({ color, emissive: color, emissiveIntensity: opts.glow ?? 0.5, roughness: 0.6, transparent: true, opacity: 0.95 }));
  m.position.set(x, y + h / 2, z);
  stage.add(m);
  actors.push({ mesh: m, baseY: y + h / 2, phase: Math.random() * 6.28, bob: opts.bob ?? 24 });
  return m;
}

/* safari（青系） */
actor(200, 300, 200, '#4DA6FF', -500, z1Y, 300);
actor(200, 300, 200, '#4DA6FF', 550, z1Y, 150);
actor(200, 300, 200, '#4DA6FF', -1000, z2Y, z2Z - 400);
actor(200, 300, 200, '#4DA6FF', 1100, z2Y, z2Z + 300);
actor(200, 300, 200, '#4DA6FF', -300, z2Y, z2Z + 1100);
/* xcode（濃青・大柄） */
actor(220, 400, 220, '#1E90FF', 500, z2Y, z2Z - 900, { glow: 0.55 });
actor(220, 400, 220, '#1E90FF', -1300, z2Y, z2Z + 700, { glow: 0.55 });

/* MacBook（ボス）：白銀の筐体＋開いたスクリーン＋赤の警告リング */
const macGroup = new THREE.Group();
{
  const body = box(520, 40, 380, mat({ color: C.apple, emissive: C.apple, emissiveIntensity: 0.35, metalness: 0.7, roughness: 0.25 }));
  body.position.y = 20;
  const screen = box(520, 360, 24, mat({ color: C.apple2, emissive: C.apple2, emissiveIntensity: 0.4, metalness: 0.7, roughness: 0.25 }));
  screen.position.set(0, 200, -180);
  screen.rotation.x = -0.32;
  /* スクリーン面の赤い光 */
  const face = box(470, 310, 6, mat({ color: '#1A0508', emissive: C.red, emissiveIntensity: 1.6 }));
  face.position.set(0, 200, -167);
  face.rotation.x = -0.32;
  macGroup.add(body, screen, face);
  macGroup.scale.setScalar(1.35);
  macGroup.position.set(0, z3Y, z3Z);
  stage.add(macGroup);
}
const dangerRing = new THREE.Mesh(
  new THREE.TorusGeometry(420, 8, 10, 72),
  mat({ color: C.red, emissive: C.red, emissiveIntensity: 2.2, transparent: true, opacity: 0.9 })
);
dangerRing.rotation.x = Math.PI / 2;
dangerRing.position.set(0, z3Y + 10, z3Z);
stage.add(dangerRing);

/* =========================================================
 * ライティング（青の道中 → 白銀のアリーナで明暗反転）
 * ======================================================= */
function pt(color, intensity, dist, x, y, z) {
  const l = new THREE.PointLight(color, intensity, dist, 1.6);
  l.position.set(x, y, z);
  scene.add(l);
}
pt(C.blue, 90000, 6000, 0, 900, 0);
pt(C.blue, 140000, 7000, 0, 1000, z2Z);
pt(C.yellow, 30000, 2500, -900, z2Y + 800, z2Z - 800);
pt(C.yellow, 30000, 2500, 950, z2Y + 800, z2Z + 850);
/* アリーナ：眩しい白 ＋ 赤 */
pt('#FFFFFF', 260000, 8000, 0, z3Y + 1600, z3Z);
pt(C.red, 60000, 3000, 0, z3Y + 300, z3Z);

/* =========================================================
 * 虚無を漂うデータ片（パーティクル）
 * ======================================================= */
const PCOUNT = 900;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PCOUNT * 3);
for (let i = 0; i < PCOUNT; i++) {
  pPos[i*3]   = (Math.random() - 0.5) * 14000;
  pPos[i*3+1] = (Math.random() - 0.5) * 6000 - 500;
  pPos[i*3+2] = Math.random() * 16000 - 2500;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const points = new THREE.Points(pGeo, new THREE.PointsMaterial({
  color: C.blue, size: 12, transparent: true, opacity: 0.5, sizeAttenuation: true
}));
scene.add(points);

/* =========================================================
 * カメラ：シネマティック巡回 ⇄ 自由視点
 * ======================================================= */
const tourCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 700, -2600),
  new THREE.Vector3(-900, 500, -300),
  new THREE.Vector3(400, 380, 1200),
  new THREE.Vector3(0, z2Y + 500, 1300 + SLOPE_SPAN + 300),
  new THREE.Vector3(-1200, z2Y + 420, z2Z + 300),
  new THREE.Vector3(900, z2Y + 600, z2Z + 1500),
  new THREE.Vector3(0, z2Y + 350, z3StartZ + 600),
  new THREE.Vector3(-1100, z3Y + 500, z3Z - 600),
  new THREE.Vector3(0, z3Y + 900, z3Z + 1400),
  new THREE.Vector3(1500, z3Y + 1400, z3Z - 200),
  new THREE.Vector3(600, 1600, z2Z),
  new THREE.Vector3(0, 1100, -1500)
], true, 'catmullrom', 0.35);

let mode = 'tour';
let tourT = 0;
const TOUR_SPEED = 1 / 75;      /* 一周 75 秒 */

/* 自由視点 */
let yaw = 0, pitch = -0.15, dragging = false;
const keys = new Set();
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (mode !== 'fly') return;
  dragging = true;
  renderer.domElement.setPointerCapture(e.pointerId);
});
window.addEventListener('pointerup', () => dragging = false);
renderer.domElement.addEventListener('pointermove', (e) => {
  if (mode !== 'fly' || !dragging) return;
  yaw   -= e.movementX * 0.0032;
  pitch -= e.movementY * 0.0032;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});
window.addEventListener('keydown', e => keys.add(e.code));
window.addEventListener('keyup', e => keys.delete(e.code));
window.addEventListener('blur', () => keys.clear());

const btnTour = document.getElementById('btnTour');
const btnFly = document.getElementById('btnFly');
function setMode(m) {
  mode = m;
  btnTour.classList.toggle('active', m === 'tour');
  btnFly.classList.toggle('active', m === 'fly');
  document.getElementById('flyHint').style.display = m === 'fly' ? 'block' : 'none';
  if (m === 'fly') {
    /* 現在のカメラ姿勢から引き継ぐ */
    const e = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
    yaw = e.y; pitch = e.x;
  }
}
btnTour.onclick = () => setMode('tour');
btnFly.onclick = () => setMode('fly');

/* =========================================================
 * ゾーン表示
 * ======================================================= */
const zoneEl = document.getElementById('zone');
let currentZone = '';
function updateZone(z) {
  let name;
  if (z < 1300 + SLOPE_SPAN * 0.5) name = 'C:\\Users\\Player\\Desktop';
  else if (z < z3StartZ + SLOPE_SPAN * 0.5) name = 'C:\\Program Files\\';
  else name = 'C:\\Program Files\\Apple\\';
  if (name !== currentZone) {
    currentZone = name;
    zoneEl.style.opacity = 0;
    setTimeout(() => {
      zoneEl.innerHTML = '<span class="path-prefix">CURRENT DIRECTORY</span>' + name.replace(/\\/g, '\\');
      zoneEl.style.color = name.includes('Apple') ? '#F5F5F7' : '#E8F2FC';
      zoneEl.style.textShadow = name.includes('Apple')
        ? '0 0 18px rgba(232,17,35,0.5)' : '0 0 18px rgba(0,164,239,0.55)';
      zoneEl.style.opacity = 1;
    }, 400);
  }
}

/* =========================================================
 * ループ
 * ======================================================= */
let last = performance.now();
function tick(t) {
  requestAnimationFrame(tick);
  const dt = Math.min((t - last) / 1000, 0.1); last = t;
  const time = t / 1000;

  /* パス文字を流す */
  pathTex.offset.y = (pathTex.offset.y - dt * 0.12) % 1;

  /* 敵の浮遊 */
  for (const a of actors) {
    a.mesh.position.y = a.baseY + Math.sin(time * 1.4 + a.phase) * a.bob;
    a.mesh.rotation.y += dt * 0.25;
  }
  /* ボス演出 */
  dangerRing.scale.setScalar(1 + Math.sin(time * 2.2) * 0.05);
  dangerRing.material.emissiveIntensity = 1.8 + Math.sin(time * 2.2) * 0.7;
  macGroup.position.y = z3Y + Math.sin(time * 0.9) * 18;

  /* パーティクル漂流 */
  points.rotation.y = time * 0.004;

  if (mode === 'tour') {
    tourT = (tourT + dt * TOUR_SPEED) % 1;
    const pos = tourCurve.getPointAt(tourT);
    const ahead = tourCurve.getPointAt((tourT + 0.015) % 1);
    camera.position.lerp(pos, 0.9);
    camera.lookAt(ahead);
  } else {
    camera.rotation.order = 'YXZ';
    camera.rotation.set(pitch, yaw, 0);
    const speed = 2400 * (keys.has('ShiftLeft') || keys.has('ShiftRight') ? 3 : 1) * dt;
    const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    if (keys.has('KeyW')) camera.position.addScaledVector(fwd, speed);
    if (keys.has('KeyS')) camera.position.addScaledVector(fwd, -speed);
    if (keys.has('KeyA')) camera.position.addScaledVector(right, -speed);
    if (keys.has('KeyD')) camera.position.addScaledVector(right, speed);
    if (keys.has('KeyQ')) camera.position.y -= speed;
    if (keys.has('KeyE')) camera.position.y += speed;
  }

  /* アリーナ接近でブルームをやや強めて「眩しさ」を演出 */
  const nearArena = Math.max(0, 1 - Math.abs(camera.position.z - z3Z) / 4000);
  bloom.strength = 0.7 + nearArena * 0.45;

  updateZone(camera.position.z);
  composer.render();
}

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

resize();
requestAnimationFrame(tick);
setTimeout(() => document.getElementById('fade').style.opacity = 0, 200);
</script>
</body>
