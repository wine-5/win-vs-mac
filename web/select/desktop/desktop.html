<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <base href="https://game.web/">
    <link rel="stylesheet" href="common/common.css">
    <link rel="stylesheet" href="select/desktop/desktop.css">
</head>
<body>
    <div class="desktop-area">
        <canvas id="matrix-bg"></canvas>

        <!-- デスクトップアイコン -->
        <div class="desktop-icons">
            <!-- ゲーム内ウィンドウを開くアイコン -->
            <div class="desk-icon" ondblclick="toggleWindow('job')">
                <img src="https://assets.game.web/images/ui/icons/job.png" alt="">
                <span>ジョブ選択</span>
            </div>
            <div class="desk-icon" ondblclick="toggleWindow('diff')">
                <img src="https://assets.game.web/images/ui/icons/diff.png" alt="">
                <span>難易度設定</span>
            </div>
            <div class="desk-icon" ondblclick="toggleWindow('file')">
                <img src="https://assets.game.web/images/ui/icons/file.png" alt="">
                <span>ファイル選択</span>
            </div>
            <div class="desk-icon" ondblclick="toggleWindow('param')">
                <img src="https://assets.game.web/images/ui/icons/param.png" alt="">
                <span>パラメータ</span>
            </div>
            <!-- ルール説明 -->
            <div class="desk-icon" ondblclick="toggleWindow('rules')">
                <span class="desk-icon-emoji">📄</span>
                <span>readme.txt</span>
            </div>
            <!-- Windows アプリ起動 -->
            <div class="desk-icon" ondblclick="launchApp('cmd')">
                <img src="https://assets.game.web/images/ui/icons/cmdicon.png" alt="">
                <span>コマンド<br>プロンプト</span>
            </div>
            <div class="desk-icon" ondblclick="launchApp('taskmgr')">
                <img src="https://assets.game.web/images/ui/app/taskManager.png" alt="">
                <span>タスク<br>マネージャー</span>
            </div>
            <div class="desk-icon" ondblclick="launchApp('recyclebin')">
                <img src="https://assets.game.web/images/ui/app/gomibako.png" alt="">
                <span>ごみ箱</span>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <div class="taskbar-apps">
            <div class="taskbar-app active" id="app-job" data-tooltip="職業選択" onclick="toggleWindow('job')">
                <img class="app-icon" src="https://assets.game.web/images/ui/icons/job.png">
            </div>
            <div class="taskbar-app active" id="app-diff" data-tooltip="難易度" onclick="toggleWindow('diff')">
                <img class="app-icon" src="https://assets.game.web/images/ui/icons/diff.png">
            </div>
            <div class="taskbar-app active" id="app-file" data-tooltip="ファイル" onclick="toggleWindow('file')">
                <img class="app-icon" src="https://assets.game.web/images/ui/icons/file.png">
            </div>
            <div class="taskbar-app active" id="app-param" data-tooltip="パラメータ" onclick="toggleWindow('param')">
                <img class="app-icon" src="https://assets.game.web/images/ui/icons/param.png">
            </div>
        </div>

        <div class="taskbar-right">
            <div class="clock" id="clock">00:00<br>--/--</div>
            <button class="start-btn" onclick="startGame()">ゲームを開始 →</button>
        </div>
    </div>

    <script src="common/messaging.js"></script>
    <script src="select/desktop/desktop-logic.js"></script>
    <script src="select/desktop/desktop-view.js"></script>
</body>
</html>
