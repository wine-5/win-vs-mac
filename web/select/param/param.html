<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <base href="https://game.web/">
    <link rel="stylesheet" href="common/common.css">
    <link rel="stylesheet" href="param/param.css">
</head>
<body>
    <div class="param-content">
        <div class="metric-row">
            <div class="metric-header">
                <span class="metric-key">HP</span>
                <span><span class="metric-val" id="v-hp">&#8212;</span><span class="metric-bonus" id="b-hp"></span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill bar-hp"    id="bar-base-hp"  style="width:0%"></div>
                <div class="bar-fill bar-bonus" id="bar-bonus-hp" style="width:0%"></div>
            </div>
        </div>
        <div class="metric-row">
            <div class="metric-header">
                <span class="metric-key">ATK</span>
                <span><span class="metric-val" id="v-atk">&#8212;</span><span class="metric-bonus" id="b-atk"></span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill bar-atk"   id="bar-base-atk"  style="width:0%"></div>
                <div class="bar-fill bar-bonus" id="bar-bonus-atk" style="width:0%"></div>
            </div>
        </div>
        <div class="metric-row">
            <div class="metric-header">
                <span class="metric-key">DEF</span>
                <span><span class="metric-val" id="v-def">&#8212;</span><span class="metric-bonus" id="b-def"></span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill bar-def"   id="bar-base-def"  style="width:0%"></div>
                <div class="bar-fill bar-bonus" id="bar-bonus-def" style="width:0%"></div>
            </div>
        </div>
        <div class="metric-row">
            <div class="metric-header">
                <span class="metric-key">SPD</span>
                <span><span class="metric-val" id="v-spd">&#8212;</span><span class="metric-bonus" id="b-spd"></span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill bar-spd"   id="bar-base-spd"  style="width:0%"></div>
                <div class="bar-fill bar-bonus" id="bar-bonus-spd" style="width:0%"></div>
            </div>
        </div>
    </div>
    <div class="param-divider"></div>
    <div class="detail-content">
        <div class="meta-row">
            <span class="meta-key">ジョブ</span>
            <span class="meta-val" id="m-job">&#8212;</span>
        </div>
        <div class="meta-row">
            <span class="meta-key">スキル</span>
            <span class="meta-val" id="m-skill">&#8212;</span>
        </div>
        <div class="meta-row">
            <span class="meta-key">装備スロット</span>
            <span class="meta-val" id="m-slot">&#8212;</span>
        </div>
    </div>
    <script src="common/messaging.js"></script>
    <script src="param/param.js"></script>
</body>
</html>
