<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(160deg, #1a2a4a 0%, #0d1520 100%);
        }

        .desktop-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* -- Difficulty Panel (left column bottom) -- */
        .difficulty-panel {
            position: absolute;
            left: 2%;
            width: 30.4%;
            top: 60%;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 20px;
            gap: 16px;
        }

        .diff-title {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .diff-buttons {
            display: flex;
            gap: 8px;
        }

        .diff-btn {
            padding: 8px 22px;
            font-size: 13px;
            font-weight: 600;
            min-width: 80px;
        }

        .diff-desc {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 18px 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.8;
            width: 100%;
        }

        /* -- Taskbar -- */
        .taskbar {
            height: 48px;
            background: rgba(12, 12, 12, 0.92);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            flex-shrink: 0;
            position: relative;
        }

        .taskbar-apps {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
        }

        .taskbar-app {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            position: relative;
            user-select: none;
        }

        .taskbar-app:hover { background: rgba(255, 255, 255, 0.1); }

        .taskbar-app.active::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 2px;
            background: #0078d4;
            border-radius: 2px;
        }

        .taskbar-app.hidden-win {
            color: rgba(255, 255, 255, 0.38);
        }

        .app-icon { font-size: 14px; }

        .taskbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clock {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
            line-height: 1.4;
            min-width: 40px;
        }

        .start-btn {
            padding: 7px 16px;
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .start-btn:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="desktop-area">
        <div class="difficulty-panel">
            <div class="diff-title">難易度選択</div>
            <div class="diff-buttons">
                <button id="btn-easy"   class="diff-btn"        onclick="setDiff('EASY')">EASY</button>
                <button id="btn-normal" class="diff-btn active"  onclick="setDiff('NORMAL')">NORMAL</button>
                <button id="btn-hard"   class="diff-btn danger"  onclick="setDiff('HARD')">HARD</button>
            </div>
            <div class="diff-desc" id="diff-desc">標準的な難易度。バランスの取れた戦闘が楽しめます。</div>
        </div>
    </div>

    <div class="taskbar">
        <div class="taskbar-apps">
            <div class="taskbar-app active" id="app-job"   onclick="toggleWindow('job')">
                <span class="app-icon">⚔</span> 職業選択
            </div>
            <div class="taskbar-app active" id="app-file"  onclick="toggleWindow('file')">
                <span class="app-icon">📁</span> ファイル
            </div>
            <div class="taskbar-app active" id="app-param" onclick="toggleWindow('param')">
                <span class="app-icon">📊</span> パラメータ
            </div>
        </div>

        <div class="taskbar-right">
            <div class="clock" id="clock">00:00<br>--/--</div>
            <button class="start-btn" onclick="startGame()">ゲームを開始 →</button>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        const winStates = { job: true, file: true, param: true };
        let currentDiff = 'NORMAL';

        const diffDescriptions = {
            EASY:   'ゲーム初心者向け。敌の攻撃力・防御力が低く、余裕を持って攻略できます。',
            NORMAL: '標準的な難易度。バランスの取れた戦闘が楽しめます。',
            HARD:   '上級者向け。敌が強力になり、戦略的なプレイが求められます。'
        };

        function setDiff(d) {
            currentDiff = d;
            ['easy', 'normal', 'hard'].forEach(function(id) {
                document.getElementById('btn-' + id).classList.remove('active');
            });
            document.getElementById('btn-' + d.toLowerCase()).classList.add('active');
            document.getElementById('diff-desc').textContent = diffDescriptions[d];
            sendToGame({ type: 'difficultyChanged', difficulty: d });
        }

        function toggleWindow(name) {
            sendToGame({ type: 'toggleWindow', window: name });
        }

        function startGame() {
            sendToGame({ type: 'startGame', difficulty: currentDiff });
        }

        function setWindowVisible(name, visible) {
            winStates[name] = visible;
            var el = document.getElementById('app-' + name);
            if (!el) return;
            if (visible) {
                el.classList.add('active');
                el.classList.remove('hidden-win');
            } else {
                el.classList.remove('active');
                el.classList.add('hidden-win');
            }
        }

        function onMessageFromGame(data) {
            if (data.type === 'windowStateChanged') {
                setWindowVisible(data.window, data.visible);
            }
        }

        function updateClock() {
            var now = new Date();
            var h  = String(now.getHours()).padStart(2, '0');
            var m  = String(now.getMinutes()).padStart(2, '0');
            var mo = now.getMonth() + 1;
            var d  = now.getDate();
            document.getElementById('clock').innerHTML = h + ':' + m + '<br>' + mo + '/' + d;
        }

        updateClock();
        setInterval(updateClock, 10000);
    </script>
</body>
</html>
